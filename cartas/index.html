<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Cartas de jugadores — FTO 2026." />
    <title>Cartas — FTO</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/pages.css" />
    <link rel="stylesheet" href="../css/cartas.css" />

    <link rel="icon" type="image/png" href="img/favicon.png">
    </head>
    <body>

    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <!-- ░░ NAVBAR ░░ -->
    <nav class="navbar" role="navigation">
    <a href="/" class="nav-logo">
        <img src="img/Logo.png" alt="Logo FTO" onerror="this.style.display='none'" />
        <div class="nav-logo-text">
        <span class="nav-siglas">FTO</span>
        <span class="nav-nombre">Fútbol Tenis Otoñal</span>
        </div>
    </a>
    <button class="burger-btn" id="burger-btn" aria-label="Abrir menú">
        <span></span><span></span><span></span>
    </button>
    <ul class="nav-menu" id="nav-menu">
        <li><a href="../" class="nav-link">Inicio</a></li>
        <li><a href="../jugadores/"  class="nav-link active">Jugadores</a></li>
        <li><a href="../reglamento/" class="nav-link">Reglamento</a></li>
        <li><a href="../nosotros/"   class="nav-link">Nosotros</a></li>
    </ul>
    </nav>

    <!-- ░░ HERO INTERIOR ░░ -->
    <header class="page-hero">
    <div class="page-hero-bg" aria-hidden="true"></div>
    <div class="page-hero-tag">Temporada</div>
    <h1 class="page-hero-title"><span>Car</span>tas</h1>
    <p class="page-hero-sub">FTO · Jugadores del torneo · Edición Otoñal</p>
    <div class="page-hero-line" aria-hidden="true"></div>
    </header>

    <!-- ░░ GRID DE CARTAS ░░ -->
    <main class="section">
    <div class="container">

        <div class="section-header reveal">
        <span class="section-icon" aria-hidden="true">🃏</span>
        <h2 class="section-title">
            <span>Jugadores</span> del Torneo
        </h2>
        <div class="section-line" aria-hidden="true"></div>
        </div>

        <div class="cartas-grid" id="cartas-grid" aria-label="Cartas de jugadores">
        <!-- Renderizado por cartas.js -->
        </div>

    </div>
    </main>

    <!-- ░░ FOOTER ░░ -->
    <footer class="footer">
    <div class="footer-inner">
        <img src="img/Logo.png" alt="Logo FTO" class="footer-logo" onerror="this.style.display='none'" />
        <p class="footer-text"><span>FTO</span> · Fútbol Tenis Otoñal · Edición 2026</p>
        <p class="footer-text">Todos los derechos reservados</p>
    </div>
</footer>

<script src="../js/data.js"></script>
<script src="../js/pages.js"></script>
<script src="../js/cartas.js"></script>
</body>
</html>
